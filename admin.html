<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Child - لوحة التحكم السرية</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { font-family: 'Cairo', sans-serif; background-color: #050505; color: white; }
        .neon-border { border: 1px solid rgba(168, 85, 247, 0.4); box-shadow: 0 0 20px rgba(168, 85, 247, 0.1); }
        .glass-card { background: rgba(255, 255, 255, 0.02); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.05); }
        input:focus { outline: none; border-color: #a855f7; box-shadow: 0 0 10px rgba(168, 85, 247, 0.5); }
    </style>
</head>
<body>

    <div id="loginScreen" class="fixed inset-0 bg-black z-[999] flex flex-col items-center justify-center p-6">
        <div class="glass-card p-10 rounded-3xl w-full max-w-md text-center neon-border">
            <div class="w-20 h-20 bg-purple-600/20 rounded-full flex items-center justify-center mx-auto mb-6">
                <i class="fas fa-user-shield text-3xl text-purple-500"></i>
            </div>
            <h1 class="text-2xl font-bold mb-2">منطقة المحظورين</h1>
            <p class="text-gray-500 mb-8 text-sm">أدخل كلمة المرور للوصول إلى لوحة الإدارة</p>
            
            <input type="password" id="passCode" placeholder="••••••••" 
                   class="w-full bg-black/50 border border-white/10 p-4 rounded-xl text-center text-2xl tracking-widest mb-4">
            
            <button onclick="unlock()" 
                    class="w-full bg-purple-600 hover:bg-purple-700 text-white font-bold py-4 rounded-xl transition-all">
                تحقق من الهوية
            </button>
            <p id="errMsg" class="text-red-500 mt-4 text-sm hidden">كلمة المرور خاطئة، حاول مجدداً.</p>
        </div>
    </div>

    <div id="adminPanel" class="hidden min-h-screen">
        <nav class="p-6 border-b border-white/5 flex justify-between items-center bg-black/50 sticky top-0 z-50">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 bg-purple-600 rounded-lg flex items-center justify-center">
                    <i class="fas fa-chart-line text-white"></i>
                </div>
                <h2 class="text-xl font-bold">إحصائيات My Child</h2>
            </div>
            <button onclick="location.reload()" class="bg-white/5 hover:bg-red-500/20 text-gray-400 hover:text-red-500 px-4 py-2 rounded-lg transition text-sm">
                <i class="fas fa-sign-out-alt ml-1"></i> تسجيل الخروج
            </button>
        </nav>

        <main class="p-6 max-w-7xl mx-auto">
            <div class="grid grid-cols-1 md:grid-cols-4 gap-6 mb-10">
                <div class="glass-card p-6 rounded-2xl">
                    <p class="text-gray-500 text-sm">إجمالي عمليات الإنشاء</p>
                    <h3 id="totalGen" class="text-3xl font-bold text-purple-400 mt-2">0</h3>
                </div>
                <div class="glass-card p-6 rounded-2xl">
                    <p class="text-gray-500 text-sm">زوار اليوم</p>
                    <h3 id="todayUsers" class="text-3xl font-bold text-blue-400 mt-2">0</h3>
                </div>
                <div class="glass-card p-6 rounded-2xl">
                    <p class="text-gray-500 text-sm">أكثر فئة طلباً</p>
                    <h3 id="popularAge" class="text-3xl font-bold text-green-400 mt-2">-</h3>
                </div>
                <div class="glass-card p-6 rounded-2xl">
                    <p class="text-gray-500 text-sm">حالة الـ API</p>
                    <h3 class="text-xl font-bold text-emerald-500 mt-2 flex items-center">
                        <span class="w-2 h-2 bg-emerald-500 rounded-full ml-2 animate-ping"></span> متصل
                    </h3>
                </div>
            </div>

            <div class="glass-card rounded-3xl overflow-hidden">
                <div class="p-6 border-b border-white/5 flex justify-between items-center">
                    <h3 class="font-bold text-lg text-purple-400">سجل النشاطات الأخير</h3>
                    <button onclick="clearHistory()" class="text-xs text-gray-600 hover:text-gray-400">مسح السجل</button>
                </div>
                <div class="overflow-x-auto">
                    <table class="w-full text-right">
                        <thead>
                            <tr class="text-gray-500 text-sm border-b border-white/5">
                                <th class="p-4">نوع الطلب</th>
                                <th class="p-4">العمر المحدد</th>
                                <th class="p-4">التوقيت</th>
                                <th class="p-4">الحالة</th>
                            </tr>
                        </thead>
                        <tbody id="logsTable" class="text-sm">
                            </tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>

    <script>
        const SECRET_KEY = "SD09042112"; // كلمة المرور الخاصة بك

        function unlock() {
            const input = document.getElementById('passCode').value;
            if (input === SECRET_KEY) {
                document.getElementById('loginScreen').classList.add('hidden');
                document.getElementById('adminPanel').classList.remove('hidden');
                renderData();
            } else {
                document.getElementById('errMsg').classList.remove('hidden');
                document.getElementById('passCode').value = '';
            }
        }

        function renderData() {
            // جلب البيانات من التخزين المحلي (الذي قمنا بربطه في ملف script.js)
            const stats = JSON.parse(localStorage.getItem('adminStats')) || { total: 0, history: [] };
            
            document.getElementById('totalGen').innerText = stats.total.toLocaleString();
            document.getElementById('todayUsers').innerText = Math.floor(stats.total * 0.7); // مثال تقريبي
            
            const table = document.getElementById('logsTable');
            table.innerHTML = '';

            if (stats.history.length === 0) {
                table.innerHTML = `<tr><td colspan="4" class="p-10 text-center text-gray-600 italic">لا توجد عمليات مسجلة حتى الآن</td></tr>`;
                return;
            }

            stats.history.reverse().slice(0, 15).forEach(log => {
                table.innerHTML += `
                    <tr class="border-b border-white/5 hover:bg-white/[0.02] transition">
                        <td class="p-4 font-medium">${log.type.split(' ')[0] === 'boy' ? 'ولد' : 'بنت'}</td>
                        <td class="p-4">${log.type.split('(')[1]?.replace(')', '') || 'غير محدد'}</td>
                        <td class="p-4 text-gray-500">${log.time}</td>
                        <td class="p-4">
                            <span class="bg-green-500/10 text-green-500 px-2 py-1 rounded text-[10px]">SUCCESS</span>
                        </td>
                    </tr>
                `;
            });
        }

        function clearHistory() {
            if (confirm("هل أنت متأكد من مسح جميع السجلات؟")) {
                localStorage.removeItem('adminStats');
                renderData();
            }
        }

        // السماح بالدخول عند الضغط على Enter
        document.getElementById('passCode').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') unlock();
        });
    </script>
</body>
</html>
