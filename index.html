<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>طفلي - استكشاف ملامح المستقبل</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Tajawal', sans-serif;
            background-color: #0d0d0d;
            color: white;
            display: flex;
            flex-col;
            align-items: center;
            min-height: screen;
        }
        .preview-circle {
            width: 130px;
            height: 130px;
            border-radius: 50%;
            border: 3px solid #bc13fe;
            object-fit: cover;
            display: none; /* تظهر فقط عند اختيار صورة */
            box-shadow: 0 0 15px rgba(188, 19, 254, 0.4);
        }
        .placeholder-icon {
            width: 130px;
            height: 130px;
            border-radius: 50%;
            background: #1a1a1a;
            display: flex;
            items-center: center;
            justify-content: center;
            border: 2px dashed #444;
            font-size: 3rem;
            transition: all 0.3s ease;
        }
        .upload-btn {
            margin-top: 15px;
            background: rgba(188, 19, 254, 0.2);
            border: 1px solid #bc13fe;
            padding: 8px 20px;
            border-radius: 50px;
            font-size: 0.85rem;
            cursor: pointer;
            transition: 0.3s;
        }
        .upload-btn:hover {
            background: #bc13fe;
            color: white;
        }
    </style>
</head>
<body class="p-6">

    <header class="text-center mt-8 mb-12">
        <h1 class="text-4xl font-bold text-purple-500 mb-2">طفلي</h1>
        <p class="text-gray-400">دمج ملامح الوالدين بالذكاء الاصطناعي</p>
    </header>

    <main class="w-full max-w-lg">
        
        <div class="flex justify-around mb-12">
            
            <div class="flex flex-col items-center">
                <div id="motherPlaceholder" class="placeholder-icon">👩</div>
                <img id="motherPreview" class="preview-circle" alt="معاينة الأم">
                <label for="motherInput" class="upload-btn">رفع صورة الأم</label>
                <input type="file" id="motherInput" class="hidden" accept="image/*">
            </div>

            <div class="flex flex-col items-center">
                <div id="fatherPlaceholder" class="placeholder-icon">👨</div>
                <img id="fatherPreview" class="preview-circle" alt="معاينة الأب">
                <label for="fatherInput" class="upload-btn">رفع صورة الأب</label>
                <input type="file" id="fatherInput" class="hidden" accept="image/*">
            </div>

        </div>

        <div class="space-y-5 bg-gray-900/50 p-6 rounded-2xl border border-gray-800">
            <div>
                <label class="block text-gray-400 text-sm mb-2 mr-1">الجنس المتوقع</label>
                <select id="gender" class="w-full bg-black border border-gray-700 p-3 rounded-xl outline-none focus:border-purple-500">
                    <option value="boy">ولد</option>
                    <option value="girl">بنت</option>
                </select>
            </div>

            <div>
                <label class="block text-gray-400 text-sm mb-2 mr-1">عمر الطفل</label>
                <select id="age" class="w-full bg-black border border-gray-700 p-3 rounded-xl outline-none focus:border-purple-500">
                    <option value="5">5 سنوات</option>
                    <option value="10">10 سنوات</option>
                    <option value="teen">15 سنة (مراهق)</option>
                    <option value="25">25 سنة (شاب)</option>
                </select>
            </div>

            <button id="generateBtn" class="w-full bg-purple-600 hover:bg-purple-500 text-white font-bold py-4 rounded-xl transition-all shadow-lg active:scale-95">
                إنشاء ملامح الطفل الآن
            </button>
        </div>

        <div id="resultArea" class="hidden mt-12 text-center pb-10">
            <h2 class="text-xl font-bold mb-6 text-purple-400">النتيجة المتوقعة</h2>
            <div class="inline-block p-2 bg-gray-800 rounded-2xl border-2 border-purple-500">
                <img id="finalImage" src="" alt="طفلك المستقبلي" class="max-w-full h-auto rounded-xl shadow-2xl">
            </div>
            <p class="mt-4 text-gray-500 text-sm italic">تم توليد الصورة بواسطة Gemini AI 1.5</p>
        </div>

    </main>

    <footer class="mt-auto py-6 text-gray-700 text-xs">
        &copy; 2026 طفلي - جميع الحقوق محفوظة
    </footer>

    <script src="script.js"></script>
</body>
</html>
